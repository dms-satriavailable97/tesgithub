<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio | Contact</title>
    <meta name="description" content="Halaman kontak portfolio personal." />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar container" aria-label="Navigasi utama">
        <a class="logo" href="index.html">PortoInformatika</a>
        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-controls="navMenu" aria-label="Buka menu navigasi">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-menu" id="navMenu">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="project.html">Project</a></li>
          <li><a class="active" href="contact.html">Contact</a></li>
        </ul>
        <button class="theme-toggle" id="themeToggle" aria-label="Ganti tema">🌙</button>
      </nav>
    </header>

    <main class="container page reveal">
      <!-- Form kontak dengan validasi JavaScript -->
      <section>
        <h1>Contact Me</h1>
        <p>Silakan isi form berikut untuk menghubungi saya.</p>

        <form id="contactForm" novalidate>
          <div class="form-group">
            <label for="name">Nama</label>
            <input type="text" id="name" name="name" placeholder="Nama lengkap" />
            <small class="error" id="nameError"></small>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="nama@email.com" />
            <small class="error" id="emailError"></small>
          </div>

          <div class="form-group">
            <label for="message">Pesan</label>
            <textarea id="message" name="message" rows="5" placeholder="Tulis pesan Anda..."></textarea>
            <small class="error" id="messageError"></small>
          </div>

          <button class="btn btn-primary" type="submit">Kirim Pesan</button>
          <p id="formSuccess" class="success" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 Portfolio Mahasiswa Informatika.</p>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
